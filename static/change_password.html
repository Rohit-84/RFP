<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="TabLogoL&T.png">
  <link rel="icon" type="image/x-icon" href="/static/TabLogoL&T.png">
  <title>Change Password</title>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f7f7f8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 28px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
      align-items: center;
      display: flex;
      flex-direction: column;
      text-align: center; /* Centers the logo and heading */
    }

    /* 👇 NEW: Styling for the logo */
    .logo {
      height: 32px; /* Adjust this number to make it bigger/smaller */
      margin-bottom: 12px;
    }

    h2 {
      text-align: center;
      color: #004a99;
      margin-top: 0;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #004a99;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    /*  NEW: Styling for the cancel button */
    .btn-cancel {
      background: #ffffff;
      color: #333;
      border: 1px solid #ccc;
      margin-top: 12px;
    }

    .btn-cancel:hover {
      background: #f1f1f1;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
    }

    .logo{
      height: 70px;
      display: flex;
      flex-direction: column;
      align-self: center;
    }
  </style>
</head>

<body>
  <div class="box">
    <img src="/static/logo.png" alt="LTTS Logo" class="logo" />
    
    <h2>Change Password</h2>

    <input id="currentpw" type="password" placeholder="Current Password"/>
    <input id="newpw" type="password" placeholder="New Password" />
    <input id="confirmpw" type="password" placeholder="Confirm New Password"/>

    <button onclick="changePw()">Update Password</button>
    
    <button class="btn-cancel" onclick="window.location.href='/'">Cancel</button>

    <div id="error" class="error"></div>
  </div>

<script>
async function changePw() {
  error.innerText = "";
  
  const currentPassword = currentpw.value;
  const newPassword = newpw.value;
  const confirmPassword = confirmpw.value;

  // 👇 NEW FIX: Frontend Password Complexity Check
  // Regex: At least 1 number, at least 1 special character, minimum 5 characters total.
  const complexRegex = /^(?=.*[0-9])(?=.*[^a-zA-Z0-9]).{5,}$/;
  
  if (!complexRegex.test(newPassword)) {
    error.innerText = "Password must be at least 5 characters long, and include at least one number and one special character.";
    return; // Stop here, don't send to the server
  }

  const res = await fetch("/change-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      current_password: currentPassword,
      new_password: newPassword,
      confirm_password: confirmPassword
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Password updated successfully. Please log in again.");
    window.location.href = "/login";   // ✅ redirect to login
  } else {
    error.innerText = data.error || "Failed to update password";
  }
}
</script>
