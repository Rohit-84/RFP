<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="TabLogoL&T.png">
  <link rel="icon" type="image/x-icon" href="/static/TabLogoL&T.png">
  <title>Reset Password</title>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f7f7f8;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 28px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
      text-align: center;
    }

    .logo {
      width: 72px;
      margin-bottom: 14px;
    }

    h2 {
      color: #004a99;
      margin-bottom: 20px;
    }

    /*  Reduced width input container */
    .input-wrap {
      position: relative;
      width: 85%;
      margin: 12px auto;
    }

    input {
      width: 100%;
      padding: 12px 48px 12px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    .toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 14px;
      color: #555;
      user-select: none;
    }

    button {
      width: 85%;
      margin-top: 20px;
      padding: 12px;
      border-radius: 22px;
      border: none;
      background: #004a99;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 13px;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #777;
    }

    /*  NEW:Revolving Circle CSS */
    .loader {
      border: 3px solid rgba(0, 74, 153, 0.2); /* Faded background track */
      border-right: 3px solid #004a99; /* Solid colored revolving edge */
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Hidden by default */
    .loading-state {
      display: none;
      margin-top: 20px;
      color: #004a99;
      font-size: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">

    <img src="/static/logo.png" class="logo" alt="Deck Genie Logo">

    <h2>Reset Password</h2>

    <div class="input-wrap">
      <input id="pw1" type="password" placeholder="New Password">
      <span class="toggle" onclick="togglePw('pw1', this)">👁</span>
    </div>

    <div class="input-wrap">
      <input id="pw2" type="password" placeholder="Confirm Password">
      <span class="toggle" onclick="togglePw('pw2', this)">👁</span>
    </div>

    <button id="submitBtn" onclick="resetPw()">Reset Password</button>

    <div id="loadingIndicator" class="loading-state">
      <div class="loader"></div> Updating password...
    </div>

    <div id="error" class="error"></div>

    <div class="footer">L&amp;T Technology Services</div>
  </div>

<script>
const token = new URLSearchParams(window.location.search).get("token");

function togglePw(id, el) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

async function resetPw() {
  // Clear any existing errors
  error.innerText = "";

  if (pw1.value !== pw2.value) {
    error.innerText = "Passwords do not match";
    return;
  }

  // Get elements
  const btn = document.getElementById("submitBtn");
  const loader = document.getElementById("loadingIndicator");

  //  HIDE button, SHOW loader
  btn.style.display = "none";
  loader.style.display = "block";

  try {
    const res = await fetch("/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: token,
        password: pw1.value
      })
    });

    const data = await res.json();

    //  SHOW button, HIDE loader (request is done)
    loader.style.display = "none";
    btn.style.display = "block";

    if (res.ok) {
      alert("Password reset successful. Please log in.");
      window.location.href = "/login";
    } else {
      error.innerText = data.error || "Reset failed";
    }
  } catch (err) {
    // Failsafe: if the network drops, restore the button
    loader.style.display = "none";
    btn.style.display = "block";
    error.innerText = "Network error. Please try again.";
  }
}
</script>

</body>
</html>
